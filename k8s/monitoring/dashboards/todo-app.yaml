apiVersion: v1
kind: ConfigMap
metadata:
  name: todo-app-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  todo-app.json: |
    {
      "title": "Todo App - RED Metrics",
      "uid": "todo-app-red",
      "description": "Request rate, error rate, and duration for the Todo App FastAPI service",
      "tags": ["todo-app", "fastapi"],
      "style": "dark",
      "schemaVersion": 36,
      "graphTooltip": 1,
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "refresh": "30s",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "label": "Datasource",
            "hide": 0,
            "refresh": 1,
            "includeAll": false,
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "lineWidth": 2 },
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(http_requests_total[5m])) by (handler, method)",
              "legendFormat": "{{method}} {{handler}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Error Rate (5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "custom": { "lineWidth": 2 },
              "color": { "fixedColor": "red", "mode": "fixed" }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(http_requests_total{status_code=~\"5..\"}[5m])) / sum(rate(http_requests_total[5m]))",
              "legendFormat": "Error Rate"
            }
          ]
        },
        {
          "id": 3,
          "title": "Request Latency Percentiles",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2 },
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "refId": "B",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "refId": "C",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p99"
            }
          ]
        },
        {
          "id": 4,
          "title": "Request Volume by Status Code (last 1h)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2 },
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(increase(http_requests_total[1h])) by (status_code)",
              "legendFormat": "{{status_code}}"
            }
          ]
        },
        {
          "id": 5,
          "title": "Requests In Progress",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2 },
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "http_requests_in_progress",
              "legendFormat": "{{handler}} {{method}}"
            }
          ]
        }
      ]
    }
