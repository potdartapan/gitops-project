name: Analytics Worker CI (GitOps)

on:
  push:
    branches: [ "master" ]
    paths:
      - 'app/analytics-worker/**'
  workflow_dispatch:

jobs:
  pylint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint
          pip install -r app/analytics-worker/requirements.txt

      - name: Run Pylint
        run: |
          pylint app/analytics-worker/*.py --fail-under=7.0 >pylint_report.txt

      - name: Upload Pylint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pylint-report-analytics
          path: pylint_report.txt

  trivy-fs-scan:
    runs-on: ubuntu-latest
    needs: pylint
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan repo using trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: table
          output: 'trivy-fs-status.txt'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Upload trivy artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-status-analytics
          path: trivy-fs-status.txt

  build-and-update-git:
    runs-on: ubuntu-latest
    needs: trivy-fs-scan
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./app/analytics-worker
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/analytics-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan built image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/analytics-worker:${{ github.sha }}'
          ignore-unfixed: true
          format: table
          output: 'trivy-image-status.txt'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Upload image scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-status-analytics
          path: trivy-image-status.txt

      - name: Update Image Tag in Helm values
        uses: mikefarah/yq@v4.44.3
        with:
          cmd: yq -i '.image.tag = "${{ github.sha }}"' 'k8s/apps/analytics-worker/values.yaml'

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          if [[ -n $(git status -s) ]]; then
            git add k8s/apps/analytics-worker/values.yaml
            git commit -m "Update analytics-worker image tag to ${{ github.sha }}"
            git push
          else
            echo "No changes to commit."
          fi
